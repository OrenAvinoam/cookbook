<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#2C2418"/>

  <!-- Spatula (behind) rotate +40deg -->
  <g transform="translate(256,256) rotate(40)">
    <!-- Head + shoulder -->
    <path d="M-44,-188 L44,-188 L44,-82 L12,-60 L12,-48 L-12,-48 L-12,-60 L-44,-82 Z" fill="#C47A5A"/>
    <!-- Head top highlight -->
    <rect x="-38" y="-182" width="76" height="16" rx="4" fill="#D4896A" opacity="0.45"/>
    <!-- Slots -->
    <rect x="-30" y="-168" width="14" height="70" rx="5" fill="#2C2418" opacity="0.32"/>
    <rect x="-7"  y="-168" width="14" height="70" rx="5" fill="#2C2418" opacity="0.32"/>
    <rect x="16"  y="-168" width="14" height="70" rx="5" fill="#2C2418" opacity="0.32"/>
    <!-- Handle -->
    <rect x="-12" y="-48" width="24" height="228" rx="12" fill="#C47A5A"/>
    <!-- Sage grip band -->
    <rect x="-12" y="62" width="24" height="52" fill="#6A9E82" opacity="0.55"/>
    <!-- End knob -->
    <ellipse cx="0" cy="182" rx="14" ry="11" fill="#B36848"/>
  </g>

  <!-- Spoon (in front) rotate -40deg -->
  <g transform="translate(256,256) rotate(-40)">
    <!-- Bowl -->
    <ellipse cx="0" cy="-148" rx="58" ry="72" fill="#F0EBE3"/>
    <!-- Bowl inner sheen -->
    <ellipse cx="8" cy="-158" rx="38" ry="47" fill="#EDE6DC" opacity="0.55"/>
    <!-- Handle -->
    <rect x="-11" y="-76" width="22" height="248" rx="11" fill="#F0EBE3"/>
    <!-- Sage grip band -->
    <rect x="-11" y="62" width="22" height="52" fill="#6A9E82" opacity="0.45"/>
    <!-- End knob -->
    <ellipse cx="0" cy="174" rx="14" ry="11" fill="#D8D0C4"/>
  </g>
</svg>
